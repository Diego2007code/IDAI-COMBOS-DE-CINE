<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineTopia - Reserva de Boletos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🎬 CineTopia: Taquilla Digital</h1>
        <p>Completa tu orden de boletos y combos de comida</p>
    </header>

    <main class="contenedor-principal">
        <section class="tarjeta">
            <h2>Configura tu Función</h2>
            <form id="formulario-cine">
                
                <div class="campo">
                    <label for="pelicula">Película:</label>
                    <select id="pelicula" required>
                        <option value="">-- Selecciona una película --</option>
                        <option value="120">Aventura Espacial ($120 MXN)</option>
                        <option value="100">Mansión Embrujada ($100 MXN)</option>
                        </select>
                </div>

                <div class="campo">
                    <label for="cantidad">Cantidad de boletos:</label>
                    <input type="number" id="cantidad" min="1" value="1" required>
                </div>

                <div class="campo">
                    <label>Tipo de Asiento:</label>
                    <div class="opciones-inline">
                        <label>
                            <input type="radio" name="asiento" value="tradicional" checked> Tradicional (Sin costo extra)
                        </label>
                        </div>
                </div>

                <div class="campo">
                    <label>Agrega un Combo de Comida:</label>
                    <div class="opciones-vertical">
                        <label>
                            <input type="checkbox" id="combo-palomitas" value="150"> Combo Palomitas + Refresco ($150 MXN)
                        </label>
                        <label>
                            <input type="checkbox" id="combo-hotdog" value="120"> Combo HotDog + Refresco ($120 MXN)
                        </label>
                        </div>
                </div>

                <button type="button" id="btn-calcular">Calcular Total</button>
            </form>
        </section>

        <section class="tarjeta resumen">
            <h2>Resumen de tu Orden</h2>
            <div class="detalle-resumen">
                <p>Subtotal Boletos: <span id="resumen-boletos">$0.00</span></p>
                <p>Cargos Extra (Asiento): <span id="resumen-asiento">$0.00</span></p>
                <p>Snacks/Combos: <span id="resumen-snacks">$0.00</span></p>
                <hr>
                <h3>Total a Pagar: <span id="total-pagar">$0.00</span></h3>
            </div>
            <div id="mensaje-alerta" class="alerta oculto"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 CineTopia S.A. - Evaluación Práctica de Desarrollo Web</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
